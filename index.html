<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c5cff">
  <title>九九乘法口诀在线小游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero" id="top">
      <div class="hero__badge">二年级乘法启蒙</div>
      <h1>乘法星球大冒险</h1>
      <p>看图理解“几个几”，闯关记口诀，救援错题星星。</p>
      <div class="hero__actions">
        <button class="btn btn-primary" type="button" data-action="go-map">开始闯关</button>
        <button class="btn btn-soft" type="button" data-action="go-rescue">错题救援站</button>
      </div>
    </header>

    <nav class="tabbar" aria-label="主导航">
      <button class="tab is-active" type="button" data-view="map">星球地图</button>
      <button class="tab" type="button" data-view="learn">口诀学习</button>
      <button class="tab" type="button" data-view="rescue">错题救援</button>
      <button class="tab" type="button" data-view="badges">我的徽章</button>
    </nav>

    <main>
      <section class="view is-active" id="view-map">
        <div class="panel panel-intro">
          <div>
            <h2>选择一个星球关卡</h2>
            <p>建议按 2、3、4、5、6～9、Boss 的顺序学习。每关先看图理解，再完成闯关。</p>
          </div>
          <div class="summary-grid" id="summaryGrid"></div>
        </div>
        <div class="level-grid" id="levelGrid"></div>
      </section>

      <section class="view" id="view-learn">
        <div class="lesson-card" id="lessonCard"></div>
      </section>

      <section class="view" id="view-play">
        <div class="play-card">
          <div class="play-top">
            <div>
              <p class="eyebrow" id="playLevelName">正在闯关</p>
              <h2 id="playTitle">准备开始</h2>
            </div>
            <div class="stars" id="roundStars" aria-label="本关星星">☆☆☆</div>
          </div>
          <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
          <div class="question-card" id="questionCard"></div>
          <div class="feedback" id="feedbackBox" aria-live="polite"></div>
          <div class="play-actions">
            <button class="btn btn-soft" type="button" data-action="back-map">返回地图</button>
            <button class="btn btn-primary" type="button" id="nextQuestionBtn">下一题</button>
          </div>
        </div>
      </section>

      <section class="view" id="view-rescue">
        <div class="panel">
          <div>
            <h2>错题救援站</h2>
            <p>答错的题会变成迷路星星。重新答对 2 次，就算救援成功。</p>
          </div>
          <button class="btn btn-soft" type="button" data-action="clear-rescued">清理已救援</button>
        </div>
        <div class="rescue-list" id="rescueList"></div>
      </section>

      <section class="view" id="view-badges">
        <div class="panel">
          <div>
            <h2>我的徽章与贴纸</h2>
            <p>完成关卡会获得星星、徽章和贴纸。继续闯关可以点亮更多星球。</p>
          </div>
        </div>
        <div class="badge-grid" id="badgeGrid"></div>
      </section>
    </main>
  </div>

  <template id="choiceTemplate">
    <button class="choice" type="button"></button>
  </template>

  <script defer src="js/levels.js"></script>
  <script defer src="js/storage.js"></script>
  <script defer src="js/rewards.js"></script>
  <script defer src="js/questions.js"></script>
  <script defer src="js/ui.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
